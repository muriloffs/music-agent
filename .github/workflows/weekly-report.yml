name: Weekly Music Report

on:
  schedule:
    # Sabado 07:17 UTC (primario) = sab 04:17 BRT — pipeline ~25min, pronto ~04:42 BRT.
    # Folga de 2h+ ate o leitor abrir o relatorio as 07:00 BRT, mesmo se o GH
    # Actions scheduler atrasar uma hora (lesson 3 — high-load delays).
    - cron: '17 7 * * 6'
    # Backup sabado 09:17 UTC = sab 06:17 BRT — pega se o primario pular.
    # Termina ~06:42 BRT, ainda antes das 7h.
    - cron: '17 9 * * 6'
  workflow_dispatch:

permissions:
  contents: write   # required to commit JSON back to repo

jobs:
  generate:
    runs-on: ubuntu-latest
    # 60min — "enrich everything" (~200 cards) even parallelized needs headroom;
    # the 30min default timed out CI #6.
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Idempotency check (skip if today's report already exists)
        id: check_report
        run: |
          EXPECTED_DATE=$(TZ=America/Sao_Paulo date +%Y-%m-%d)
          EXPECTED_FILE="data/relatorio-${EXPECTED_DATE}.json"
          if [ -f "$EXPECTED_FILE" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Report for $EXPECTED_DATE already exists; skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: github.event_name == 'workflow_dispatch' || steps.check_report.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' || steps.check_report.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r agent/requirements.txt

      - name: Run pipeline
        if: github.event_name == 'workflow_dispatch' || steps.check_report.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: python -m agent.scripts.generate_report

      - name: Commit and push report
        if: github.event_name == 'workflow_dispatch' || steps.check_report.outputs.skip != 'true'
        run: |
          # Find the report file actually written by the Python pipeline rather
          # than recomputing the date in shell — Python uses UTC (date.today())
          # while shell TZ=America/Sao_Paulo can differ by a day around 00 UTC.
          REPORT_FILE=$(ls -1 data/relatorio-*.json 2>/dev/null | sort -r | head -1)
          if [ -z "$REPORT_FILE" ]; then
            echo "No report file was generated by the pipeline; nothing to commit."
            exit 1
          fi
          echo "Committing $REPORT_FILE"
          git config user.name "music-agent-bot"
          git config user.email "music-agent-bot@users.noreply.github.com"
          git add "$REPORT_FILE"
          if git diff --cached --quiet; then
            echo "No changes to commit (file already in repo, untouched by pipeline)."
          else
            REPORT_NAME=$(basename "$REPORT_FILE" .json | sed 's/relatorio-//')
            git commit -m "data: weekly report for ${REPORT_NAME}"
            # Pull --rebase in case another commit landed since the workflow checked out
            git pull --rebase origin main
            git push
          fi
